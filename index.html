<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4f86c6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="wwads">
  <title>wwads — weather without ads</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="cities-bar">
    <div class="chips" id="chips" role="tablist" aria-label="Saved cities"></div>
    <div class="bar-actions">
      <button id="btn-add-current" class="icon-btn" aria-label="Add current location" title="Add current location">📍</button>
      <button id="btn-add-search" class="icon-btn" aria-label="Add city by search" title="Add city">+</button>
      <div class="unit-toggle" role="group" aria-label="Temperature unit">
        <button class="unit-opt" data-unit="c" aria-pressed="true" title="Celsius">°C</button>
        <button class="unit-opt" data-unit="f" aria-pressed="false" title="Fahrenheit">°F</button>
      </div>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Views">
    <button class="tab active" data-tab="forecast" role="tab" aria-selected="true">Forecast</button>
    <button class="tab" data-tab="radar" role="tab" aria-selected="false">Radar</button>
  </nav>

  <main>
    <section id="empty-state" class="empty-state" hidden>
      <div class="empty-icon" aria-hidden="true">⛅</div>
      <h1>No cities yet</h1>
      <p>Add one to get started.</p>
      <div class="empty-actions">
        <button class="btn primary" id="empty-add-current">📍 Use my location</button>
        <button class="btn" id="empty-add-search">+ Search for a city</button>
      </div>
    </section>

    <section id="forecast-view" class="view" hidden>
      <div class="current" id="current"></div>
      <div class="next-hour" id="next-hour"></div>
      <h2 class="section-title">Next 24 hours</h2>
      <div class="hourly" id="hourly"></div>
      <h2 class="section-title">5-day forecast</h2>
      <div class="daily" id="daily"></div>
      <p class="attribution">Weather data by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>, <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a></p>
    </section>

    <section id="radar-view" class="view" hidden>
      <div id="map" class="map" aria-label="Rain radar map"></div>
      <div class="radar-controls">
        <button id="radar-play" class="icon-btn" aria-label="Play/Pause animation" title="Play/Pause">⏸</button>
        <input type="range" id="radar-slider" min="0" max="0" value="0" step="1" aria-label="Radar timeline">
        <span id="radar-time" class="radar-time" aria-live="polite"></span>
      </div>
      <p class="attribution">Radar © <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer</a> · Map © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors · <a href="https://leafletjs.com/" target="_blank" rel="noopener">Leaflet</a></p>
    </section>
  </main>

  <footer class="app-footer" role="contentinfo">
    <span class="version">
      <span class="version-dot" aria-hidden="true"></span>
      <span id="version-text">wwads</span>
    </span>
    <span class="sep" aria-hidden="true">·</span>
    <a class="copyright" href="https://github.com/jmrk84" target="_blank" rel="noopener">© J. Kornfeld</a>
    <span class="sep" aria-hidden="true">·</span>
    <a href="https://github.com/jdecked/twemoji" target="_blank" rel="noopener">Twemoji</a>
  </footer>

  <div id="toast-host" aria-live="polite" aria-atomic="false"></div>

  <dialog id="search-dialog" class="dialog" aria-label="Search for a city">
    <header>
      <h2>Add city</h2>
      <button type="button" class="icon-btn close" id="search-close" aria-label="Close">×</button>
    </header>
    <input type="search" id="search-input" placeholder="Search city…" autocomplete="off" enterkeyhint="search">
    <ul id="search-results" class="search-results" role="listbox"></ul>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
